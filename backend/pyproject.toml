[project]
name = "capacidade-produtiva"
version = "0.1.0"
description = "Sistema de gestão operacional CapacidadeProdutiva"
readme = "README.md"
requires-python = "==3.12.*"
dependencies = []
[dependency-groups]
dev = [
  "pytest==8.2.0",
  "pytest-cov==5.0.0",
  "ruff==0.4.4",
  "mypy==1.10.0",
]

# ---------------------------------------------------------------------------
# Build system
# ---------------------------------------------------------------------------

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cp"]
[tool.hatch.build.targets.wheel.sources]
"cp" = "src/cp"

# ---------------------------------------------------------------------------
# Ferramentas de desenvolvimento
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# E = erros de estilo (pycodestyle)
# F = erros lógicos (pyflakes) — variável não usada, import não usado, etc.
# I = ordenação de imports (isort)
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true

# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
addopts = "--cov=cp --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]
